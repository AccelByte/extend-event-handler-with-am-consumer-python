syntax = "proto3";
package accelbyte.extend.async_messaging;

option go_package = "github.com/AccelByte/extend-event-handler-go/pkg/pb/async_messaging";

import "google/protobuf/empty.proto";
import "google/protobuf/descriptor.proto";

// Custom method option for topic subscription list
extend google.protobuf.MethodOptions {
  string topics_subscription = 50001;
}

message ReceivedMessage {
  string body = 1;
  string topic = 2;
  map<string, string> metadata = 3;
}

service AsyncMessagingConsumerService {
  rpc onMessage(ReceivedMessage) returns (google.protobuf.Empty) {
    option (topics_subscription) = "PlayerKilled, PlayerSaved, PlayerJoined";
  };
}
